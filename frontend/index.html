<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Mall — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --indigo:    #4f46e5;
    --indigo-d:  #3730a3;
    --indigo-l:  #818cf8;
    --amber:     #f59e0b;
    --amber-l:   #fef3c7;
    --surface:   #ffffff;
    --bg:        #f0f0ff;
    --text:      #1e1b4b;
    --muted:     #6b7280;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-1 { width: 500px; height: 500px; background: #818cf8; top: -150px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: #f59e0b; bottom: -100px; right: -80px; animation-delay: 3s; }
  .blob-3 { width: 300px; height: 300px; background: #a78bfa; top: 40%; left: 60%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-30px) scale(1.05); }
  }

  .login-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(79,70,229,0.15);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 25px 60px rgba(79,70,229,0.18), 0 8px 20px rgba(0,0,0,0.06);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    z-index: 10;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--indigo), var(--indigo-l));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 14px rgba(79,70,229,0.4);
  }

  .brand-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--indigo-d);
    line-height: 1;
  }
  .brand-text span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .login-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .login-card p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e7ff;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fafbff;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    background: white;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--indigo), #6366f1);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(79,70,229,0.4);
    margin-top: 8px;
  }
  .btn-login:hover  { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,70,229,0.45); }
  .btn-login:active { transform: translateY(1px); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .error-msg {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }

  .hint {
    margin-top: 20px;
    padding: 12px 16px;
    background: var(--amber-l);
    border-radius: 10px;
    border-left: 3px solid var(--amber);
    font-size: 12px;
    color: #92400e;
  }
  .hint b { display: block; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🛍</div>
    <div class="brand-text">
      <h1>Smart Mall</h1>
      <span>INVENTORY & SALES SYSTEM</span>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p>Sign in to manage your store</p>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="admin@gmail.com" value="admin@gmail.com" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" value="admin123" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
  <div class="error-msg" id="errMsg"></div>

  <div class="hint">
    <b>🔑 Demo Credentials</b>
    admin@gmail.com / admin123
  </div>
</div>

<script>
  const API = 'http://localhost:8000';

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      window.location.href = 'dashboard.html';
    } catch(e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
