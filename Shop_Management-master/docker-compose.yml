version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: smart_mall_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_mall
      MYSQL_USER: malluser
      MYSQL_PASSWORD: mall123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smart_mall_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: smart_mall
      DB_USER: malluser
      DB_PASSWORD: mall123
      SECRET_KEY: supersecretjwtkey2024smartmall
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
